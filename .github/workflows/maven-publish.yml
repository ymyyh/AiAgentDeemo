name: Publish package to the Maven Central Repository and GitHub Packages
on:
  push:
    branches:
      - master
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # 应用核心配置
      APP_NAME: aiagent-core
      SERVICE_PORT: 8081
      RUNNING_ACTIVE: prod
      # 目录配置
      LOG_DIR: /home/app/aiagent-core/logs
      CONFIG_DIR: /home/conf/aiagent-core
      SHELL_RUN_DIR: /home/run
      # 阿里云ACR配置
      ACR_DOMAIN: crpi-eh17ftr3tyc2lrwq.cn-hangzhou.personal.cr.aliyuncs.com
      ACR_ZONE: aiagent-deemo
      VERSION: ${{ github.sha }}

    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 登录阿里云ACR镜像仓库
      - name: Login to Aliyun Container Registry (ACR)
        uses: aliyun/acr-login@v1
        with:
          login-server: crpi-eh17ftr3tyc2lrwq.cn-hangzhou.personal.cr.aliyuncs.com
          region-id: cn-hangzhou
          username: ${{ secrets.ALIYUN_DOCKER_REGISTER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTER_PASSWORD }}

      # 构建并推送镜像到阿里云ACR
      - name: Build and Push Docker Image to ACR
        run: |
          docker build -t ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:${{ env.VERSION }} .
          docker push ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:${{ env.VERSION }}
          # 打latest标签方便后续固定拉取
          docker tag ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:${{ env.VERSION }} \
                     ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:latest
          docker push ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:latest

      # SSH连接阿里云ECS部署应用
      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_REMOTE_HOST }}
          username: ${{ secrets.ALIYUN_REMOTE_USER }}
          password: ${{ secrets.ALIYUN_REMOTE_PASSWORD }}
          script: |
            # 初始化本地目录
            mkdir -p /home/run
            mkdir -p ${{ env.LOG_DIR }}
            mkdir -p ${{ env.CONFIG_DIR }}
            
            chmod 755 /home/run
            chmod 755 ${{ env.LOG_DIR }}
            chmod 755 ${{ env.CONFIG_DIR }}
            
            # 拉取最新镜像
            docker pull ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:${{ env.VERSION }}

            # 生成启动脚本
            mkdir -p ${{ env.SHELL_RUN_DIR }}
            START_SCRIPT="${{ env.SHELL_RUN_DIR }}/docker_run_${{ env.APP_NAME }}_${{ env.RUNNING_ACTIVE }}.sh"
            cat > $START_SCRIPT <<EOL
            #!/bin/bash
            echo "==================== 停止旧容器 ===================="
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            # 清理无用镜像释放空间
            docker image prune -f
            docker builder prune -f
            
            echo "==================== 启动新容器 ===================="
            docker run -itd \
              --name ${{ env.APP_NAME }} \
              --restart always \
              -p ${{ env.SERVICE_PORT }}:${{ env.SERVICE_PORT }} \
              -v ${{ env.LOG_DIR }}:/logs \
              -v ${{ env.CONFIG_DIR }}:/config \
              -e "SPRING_PROFILES_ACTIVE=${{ env.RUNNING_ACTIVE }}" \
              ${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${{ env.APP_NAME }}:${{ env.VERSION }}
            EOL
            
            chmod +x $START_SCRIPT
            echo "启动脚本生成完成：$START_SCRIPT"
            bash $START_SCRIPT