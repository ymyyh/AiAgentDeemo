# 流水线名称
name: 自动构建并部署双微服务(AiAgent-core + AiAgent-mcp)到阿里云ECS

# 触发条件：master分支代码推送时自动运行
on:
  push:
    branches:
      - main

# 任务定义
jobs:
  build-deploy:
    runs-on: ubuntu-latest

    # ==========================
    # 【全局环境变量配置】
    # ==========================
    env:
      # ========== 阿里云ACR镜像仓库统一配置 ==========
      ACR_DOMAIN: crpi-eh17ftr3tyc2lrwq.cn-hangzhou.personal.cr.aliyuncs.com
      ACR_NAMESPACE: aiagent-deemo
      VERSION: ${{ github.sha }}

      # ========== 微服务1：AiAgent-core 配置 ==========
      SERVICE1_NAME: aiagent-core
      SERVICE1_PORT: 8081
      SERVICE1_ACTIVE: prod
      SERVICE1_MODULE: AiAgent-core

      # ========== 微服务2：AiAgent-mcp 配置 ==========
      SERVICE2_NAME: aiagent-mcp
      SERVICE2_PORT: 8082
      SERVICE2_ACTIVE: prod
      SERVICE2_MODULE: AiAgent-mcp

    permissions:
      contents: read

    # ==========================
    # 流水线执行步骤
    # ==========================
    steps:
      # 1. 拉取代码
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 2. 配置JDK 21
      - name: 设置JDK 21环境
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 【关键修复】Maven 编译打包所有模块（生成可执行 SpringBoot jar）
      - name: Maven 打包所有微服务（生成可执行JAR）
        run: mvn clean package -DskipTests -U

      # 4. 登录阿里云ACR
      - name: 登录阿里云ACR镜像仓库
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.ACR_DOMAIN }}
          region-id: cn-hangzhou
          username: ${{ secrets.ALIYUN_DOCKER_REGISTER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTER_PASSWORD }}

      # ==========================
      # 构建微服务1：AiAgent-core
      # ==========================
      - name: 构建并推送微服务1：aiagent-core
        run: |
          docker build -t ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE1_NAME }}:${{ env.VERSION }} \
            --build-arg JAR_FILE=${{ env.SERVICE1_MODULE }}/target/*.jar .
          docker push ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE1_NAME }}:${{ env.VERSION }}

      # ==========================
      # 构建微服务2：AiAgent-mcp
      # ==========================
      - name: 构建并推送微服务2：aiagent-mcp
        run: |
          docker build -t ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE2_NAME }}:${{ env.VERSION }} \
            --build-arg JAR_FILE=${{ env.SERVICE2_MODULE }}/target/*.jar .
          docker push ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE2_NAME }}:${{ env.VERSION }}

      # ==========================
      # 部署到ECS服务器
      # ==========================
      - name: 部署双微服务到阿里云ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALIYUN_REMOTE_HOST }}
          username: ${{ secrets.ALIYUN_REMOTE_USER }}
          password: ${{ secrets.ALIYUN_REMOTE_PASSWORD }}
          script: |
            # ============================================
            # 部署微服务 1：AiAgent-core (端口 8081)
            # ============================================
            docker pull ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE1_NAME }}:${{ env.VERSION }}
            docker stop ${{ env.SERVICE1_NAME }} || true
            docker rm ${{ env.SERVICE1_NAME }} || true
            docker run -d \
              --name ${{ env.SERVICE1_NAME }} \
              --restart always \
              -p ${{ env.SERVICE1_PORT }}:${{ env.SERVICE1_PORT }} \
              -e SPRING_PROFILES_ACTIVE=${{ env.SERVICE1_ACTIVE }} \
              ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE1_NAME }}:${{ env.VERSION }}

            # ============================================
            # 部署微服务 2：AiAgent-mcp (端口 8082)
            # ============================================
            docker pull ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE2_NAME }}:${{ env.VERSION }}
            docker stop ${{ env.SERVICE2_NAME }} || true
            docker rm ${{ env.SERVICE2_NAME }} || true
            docker run -d \
              --name ${{ env.SERVICE2_NAME }} \
              --restart always \
              -p ${{ env.SERVICE2_PORT }}:${{ env.SERVICE2_PORT }} \
              -e SPRING_PROFILES_ACTIVE=${{ env.SERVICE2_ACTIVE }} \
              ${{ env.ACR_DOMAIN }}/${{ env.ACR_NAMESPACE }}/${{ env.SERVICE2_NAME }}:${{ env.VERSION }}