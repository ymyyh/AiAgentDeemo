name: Build and Deploy Microservices
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RUNNING_ACTIVE: prod
      ACR_DOMAIN: crpi-eh17ftr3tyc2lrwq.cn-hangzhou.personal.cr.aliyuncs.com
      ACR_ZONE: aiagent-deemo
      VERSION: ${{ github.sha }}
      SHELL_RUN_DIR: /home/run
      DOCKER_NETWORK: aiagent-network

    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven packages
        run: mvn -B -DskipTests package

      - name: Login to Aliyun Container Registry (ACR)
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.ACR_DOMAIN }}
          region-id: cn-hangzhou
          username: ${{ secrets.ALIYUN_DOCKER_REGISTER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          set -euo pipefail

          services=(
            "aiagent-core|AiAgent-core|8081"
            "aiagent-mcp|AiAgent-mcp|8082"
          )

          for service in "${services[@]}"; do
            IFS='|' read -r app_name module_name service_port <<< "$service"
            image="${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${app_name}:${{ env.VERSION }}"
            latest_image="${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}/${app_name}:latest"
            jar_file="${module_name}/target/${module_name}-0.0.1-SNAPSHOT.jar"

            docker build \
              --build-arg JAR_FILE="${jar_file}" \
              --build-arg SERVICE_PORT="${service_port}" \
              -t "${image}" \
              -t "${latest_image}" \
              .

            docker push "${image}"
            docker push "${latest_image}"
          done

      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_REMOTE_HOST }}
          username: ${{ secrets.ALIYUN_REMOTE_USER }}
          password: ${{ secrets.ALIYUN_REMOTE_PASSWORD }}
          script: |
            set -e

            ACR_IMAGE="${{ env.ACR_DOMAIN }}/${{ env.ACR_ZONE }}"
            VERSION="${{ env.VERSION }}"
            RUNNING_ACTIVE="${{ env.RUNNING_ACTIVE }}"
            SHELL_RUN_DIR="${{ env.SHELL_RUN_DIR }}"
            DOCKER_NETWORK="${{ env.DOCKER_NETWORK }}"

            mkdir -p "${SHELL_RUN_DIR}"
            chmod 755 "${SHELL_RUN_DIR}"

            echo "${{ secrets.ALIYUN_DOCKER_REGISTER_PASSWORD }}" | docker login "${{ env.ACR_DOMAIN }}" \
              --username "${{ secrets.ALIYUN_DOCKER_REGISTER_USERNAME }}" \
              --password-stdin

            docker network create "${DOCKER_NETWORK}" || true

            deploy_service() {
              app_name="$1"
              service_port="$2"
              log_dir="/home/app/${app_name}/logs"
              config_dir="/home/conf/${app_name}"
              image="${ACR_IMAGE}/${app_name}:${VERSION}"
              start_script="${SHELL_RUN_DIR}/docker_run_${app_name}_${RUNNING_ACTIVE}.sh"

              mkdir -p "${log_dir}" "${config_dir}"
              chmod 755 "${log_dir}" "${config_dir}"

              docker pull "${image}"

              cat > "${start_script}" <<EOL
            #!/bin/bash
            set -e
            echo "==================== 停止旧应用容器：${app_name} ===================="
            docker stop ${app_name} || true
            docker rm ${app_name} || true

            echo "==================== 启动应用容器：${app_name} ===================="
            docker run -d \\
              --name ${app_name} \\
              --restart always \\
              --network ${DOCKER_NETWORK} \\
              -p ${service_port}:${service_port} \\
              -v ${log_dir}:/logs \\
              -v ${config_dir}:/config \\
              -e "SPRING_PROFILES_ACTIVE=${RUNNING_ACTIVE}" \\
              -e "SERVER_PORT=${service_port}" \\
            EOL

              if [ "${app_name}" = "aiagent-core" ]; then
                cat >> "${start_script}" <<EOL
              ${image} \\
              --spring.ai.mcp.client.sse.connections.stock-mcp.url=http://aiagent-mcp:8082
            EOL
              else
                cat >> "${start_script}" <<EOL
              ${image}
            EOL
              fi

              chmod +x "${start_script}"
              echo "启动脚本已生成：${start_script}"
              bash "${start_script}"
            }

            deploy_service "aiagent-mcp" "8082"
            deploy_service "aiagent-core" "8081"

            docker image prune -f
            docker builder prune -f